name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    environment:
      name: PyPI
      url: https://pypi.org/p/pypesto

    permissions:
      id-token: write

    steps:
    - name: Check out repository
      uses: actions/checkout@v6

    - name: Remove direct dependencies from pyproject.toml
      # Remove any "git+https"-based dependencies that are not supported
      #  by PyPI and are only required for testing.
      run: sed -i '/git+https/d' pyproject.toml

    - name: Prepare python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -U build

    - name: Build distribution
      run:
        python -m build

    - name: Publish a Python distribution to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
